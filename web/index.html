<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0d10" />
  <title>HAR Demo</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main id="app">
    <header class="top">
      <div class="brand">HAR</div>
      <div id="status-pill" class="pill pill--idle">idle</div>
    </header>

    <section class="stage">
      <div id="label" class="label label--idle">WAITING</div>
      <div id="confidence-wrap" class="confidence">
        <div id="confidence-bar" class="confidence__bar"></div>
        <div id="confidence-text" class="confidence__text">—</div>
      </div>
      <div id="source" class="source">no tracker active</div>
    </section>

    <section class="controls">
      <button id="btn-track" class="btn btn--primary" type="button">
        Start tracking on this device
      </button>
      <button id="btn-stop" class="btn btn--ghost hidden" type="button">
        Stop tracking
      </button>
      <div id="msg" class="msg"></div>
    </section>

    <footer class="bottom">
      <div id="meta" class="meta"></div>
    </footer>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
